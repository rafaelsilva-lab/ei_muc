/* Estado */
const navState = {};
let cur=0, score=0, answered=false;

function build(){
  const c=document.getElementById('qc');
  c.innerHTML='';
  const L=['A','B','C','D'];
  QS.forEach((q,i)=>{
    const d=document.createElement('div');
    d.className='qcard'+(i===0?' active':'');
    d.id='q'+i;
    d.innerHTML=`
      <div class="qm">
        <span class="qn">Questão ${i+1} de ${QS.length}</span>
        <span class="chip ${q.dc}">${q.d}</span>
      </div>
      <div class="qt">${q.t}</div>
      <div class="opts">
        ${q.o.map((o,j)=>`
          <button class="opt" onclick="pick(${i},${j})" id="o${i}_${j}">
            <span class="ol">${L[j]}</span>
            <span>${o}</span>
          </button>`).join('')}
      </div>
      <div class="fb" id="f${i}"></div>`;
    c.appendChild(d);
  });
  buildNav();
  setP();
}

function buildNav(){
  const nav=document.getElementById('qnav');
  nav.innerHTML='';
  QS.forEach((_,i)=>{
    const btn=document.createElement('button');
    btn.className='qnav-btn'+(i===cur?' nav-cur':'');
    btn.id='nb'+i;
    btn.textContent=i+1;
    btn.title='Ir para questão '+(i+1)+' — '+QS[i].d;
    btn.onclick=()=>jumpTo(i);
    nav.appendChild(btn);
  });
}

function updateNav(){
  QS.forEach((_,i)=>{
    const btn=document.getElementById('nb'+i);
    if(!btn)return;
    btn.className='qnav-btn';
    if(i===cur) btn.classList.add('nav-cur');
    else if(navState[i]===true) btn.classList.add('nav-done-ok');
    else if(navState[i]===false) btn.classList.add('nav-done-err');
  });
}

function jumpTo(i){
  if(i===cur)return;
  cur=i; answered=(navState[i]!==undefined);
  document.querySelectorAll('.qcard').forEach(c=>c.classList.remove('active'));
  document.getElementById('q'+cur).classList.add('active');
  document.getElementById('qct').textContent=(cur+1)+' de '+QS.length;
  document.getElementById('btn').disabled=!answered;
  setP();
  updateNav();
  document.getElementById('q'+cur).scrollIntoView({behavior:'smooth',block:'nearest'});
}

function pick(qi,oi){
  if(answered)return;
  answered=true;
  const q=QS[qi];
  document.querySelectorAll('#q'+qi+' .opt').forEach(o=>o.disabled=true);
  document.getElementById('o'+qi+'_'+oi).classList.add(oi===q.c?'correct':'wrong');
  if(oi!==q.c) document.getElementById('o'+qi+'_'+q.c).classList.add('correct');
  const ok=(oi===q.c);
  if(ok && navState[qi]===undefined) score++;
  navState[qi]=ok;
  const fb=document.getElementById('f'+qi);
  fb.className='fb show '+(ok?'fbc':'fbw');
  fb.innerHTML='<span class="fi2">'+(ok?'✅':'❌')+'</span><span>'+q.f+'</span>';
  document.getElementById('btn').disabled=false;
  updateNav();
}

function nextQ(){
  cur++; answered=false;
  document.getElementById('btn').disabled=true;
  if(cur>=QS.length){showScore();return;}
  document.querySelectorAll('.qcard').forEach(c=>c.classList.remove('active'));
  document.getElementById('q'+cur).classList.add('active');
  document.getElementById('qct').textContent=(cur+1)+' de '+QS.length;
  setP();
  updateNav();
}

function setP(){ document.getElementById('pf').style.width=(cur/QS.length*100)+'%'; }

function showScore(){
  document.getElementById('qc').style.display='none';
  document.getElementById('qfoot').style.display='none';
  document.getElementById('qnav-wrap').style.display='none';
  document.getElementById('pf').style.width='100%';
  const sp=document.getElementById('sp');
  sp.classList.add('show');
  const pct=Math.round(score/QS.length*100);
  document.getElementById('sbig').textContent=score;
  document.getElementById('stot').textContent='/'+QS.length;
  const titles=['💪 Continue estudando!','📚 Bom resultado!','🏆 Excelente!'];
  const ti=pct>=80?2:pct>=60?1:0;
  document.getElementById('stitle').textContent=titles[ti];
  document.getElementById('ssub').textContent='Você acertou '+pct+'% das questões. '+(pct>=80?'Você está bem preparado para a prova!':pct>=60?'Revise os pontos errados nas abas de conteúdo.':'Volte às abas e releia o material antes de tentar novamente.');
  const colors=['var(--red)','var(--orange)','var(--green)'];
  const bgs=['var(--red-light)','var(--orange-light)','var(--green-light)'];
  const sc=document.getElementById('scirc');
  sc.style.borderColor=colors[ti]; sc.style.background=bgs[ti];
  document.getElementById('sbig').style.color=colors[ti];
}

function restart(){
  cur=0; score=0; answered=false;
  Object.keys(navState).forEach(k=>delete navState[k]);
  document.getElementById('qc').style.display='block';
  document.getElementById('qfoot').style.display='flex';
  document.getElementById('qnav-wrap').style.display='block';
  document.getElementById('sp').classList.remove('show');
  document.getElementById('btn').disabled=true;
  document.getElementById('qct').textContent='1 de '+QS.length;
  build();
}

function showPanel(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.drawer-item').forEach(d=>d.classList.remove('active'));
  const map={'resumo':0,'urgencia':1,'cirurgica':2,'uti':3,'quiz':4};
  const items=document.querySelectorAll('.drawer-item');
  if(items[map[id]])items[map[id]].classList.add('active');
}

function toggleDrawer(){
  const d=document.getElementById('drawer');
  const o=document.getElementById('overlay');
  const b=document.getElementById('hamBtn');
  const isOpen=d.classList.contains('open');
  if(isOpen){ closeDrawer(); }
  else { d.classList.add('open'); o.classList.add('show'); b.classList.add('open'); document.body.style.overflow='hidden'; }
}

function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('hamBtn').classList.remove('open');
  document.body.style.overflow='';
}

function drawerNav(id,el){
  const labels={resumo:'Resumo Geral',urgencia:'Urgências Clínicas',cirurgica:'Cirúrgica I e II',uti:'Terapia Intensiva',quiz:'Quiz'};
  document.querySelectorAll('.drawer-item').forEach(d=>d.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('hsub').textContent=labels[id]||id;
  closeDrawer();
  window.scrollTo({top:0,behavior:'smooth'});
}

build();
</script>
